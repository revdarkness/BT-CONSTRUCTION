<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BT Construction Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1B3A5C', light: '#244D78', dark: '#142C45' },
                        gold: { DEFAULT: '#C8963E', light: '#D4A94F' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-navy min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">
        <!-- Branding -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gold">BT Construction</h1>
            <p class="text-gray-300 mt-2">Admin Panel</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for category, message in messages %}
            <div class="rounded-lg px-4 py-3 text-sm font-medium
                {% if category == 'error' %}bg-red-100 text-red-800
                {% elif category == 'warning' %}bg-yellow-100 text-yellow-800
                {% elif category == 'success' %}bg-green-100 text-green-800
                {% else %}bg-blue-100 text-blue-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- Login card -->
        <div class="bg-white rounded-xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-navy mb-6 text-center">Sign In</h2>

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-5">
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:border-gold focus:outline-none transition"
                        placeholder="Enter username" autocomplete="username">
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:border-gold focus:outline-none transition"
                        placeholder="Enter password" autocomplete="current-password">
                </div>

                <button type="submit"
                    class="w-full bg-gold hover:bg-gold-light text-white font-bold py-3 px-6 rounded-lg text-lg transition duration-200 shadow-md hover:shadow-lg">
                    Log In
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-sm mt-6">
            BT Construction LLC &mdash; Quality Craftsmanship, Lasting Results
        </p>
    </div>

</body>
</html>
